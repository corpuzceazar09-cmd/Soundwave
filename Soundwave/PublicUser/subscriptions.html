<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundWave - Subscriptions</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --sidebar: 240px; --player-h: 80px; --topbar-h: 64px; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #F8FAFC; color: #0F172A; min-height: 100vh; display: flex; }
    .sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar); height: 100vh; background: #0F172A; display: flex; flex-direction: column; z-index: 100; border-right: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 20px 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand span { font-size: 15px; font-weight: 700; color: #fff; }
    .sidebar-brand span small { display: block; font-size: 10px; font-weight: 500; color: #38BDF8; }
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; color: #64748B; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: transparent; font-family: inherit; width: 100%; text-align: left; transition: all 0.15s; }
    .nav-item:hover { color: #CBD5E1; background: rgba(255,255,255,0.05); }
    .nav-item.active { color: #fff; background: rgba(56,189,248,0.15); }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    .main-area { margin-left: var(--sidebar); width: calc(100% - var(--sidebar)); padding-bottom: var(--player-h); min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { height: var(--topbar-h); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; background: #fff; border-bottom: 1px solid #E2E8F0; position: sticky; top: 0; z-index: 50; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #38BDF8, #818CF8); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; margin-left: 4px; }
    .content { flex: 1; padding: 28px 32px 32px; overflow-y: auto; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .page-header h1 { font-size: 28px; font-weight: 900; }
    .sort-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 10px; border: none; background: #F1F5F9; color: #64748B; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .sort-btn:hover { background: #E2E8F0; }
    .section { margin-bottom: 32px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-header h2 { font-size: 20px; font-weight: 800; }
    .section-header .count { font-size: 13px; color: #94A3B8; font-weight: 500; }
    .section-header a { font-size: 14px; font-weight: 600; color: #38BDF8; text-decoration: none; }
    .section-header a:hover { color: #0EA5E9; }
    .release-list { display: flex; flex-direction: column; gap: 8px; }
    .release-row { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 12px; cursor: pointer; transition: background 0.15s; border: 1px solid #F1F5F9; background: #fff; }
    .release-row:hover { background: #F8FAFC; }
    .release-icon { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: rgba(56,189,248,0.1); }
    .release-info { flex: 1; min-width: 0; }
    .release-info .r-title { font-size: 14px; font-weight: 600; color: #0F172A; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .release-info .r-meta { font-size: 12px; color: #64748B; font-weight: 500; }
    .release-date { font-size: 12px; color: #94A3B8; white-space: nowrap; }
    .sub-grid { display: flex; flex-wrap: wrap; gap: 20px; }
    .sub-card { width: 180px; cursor: pointer; transition: transform 0.15s; }
    .sub-card:hover { transform: translateY(-4px); }
    .sub-cover { width: 180px; height: 180px; border-radius: 14px; margin-bottom: 12px; position: relative; overflow: hidden; }
    .sub-cover .cover-bg { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .cover-play-overlay { position: absolute; bottom: 10px; right: 10px; width: 40px; height: 40px; border-radius: 50%; background: #38BDF8; display: flex; align-items: center; justify-content: center; opacity: 0; transform: translateY(6px); transition: all 0.2s; box-shadow: 0 4px 12px rgba(56,189,248,0.4); }
    .sub-card:hover .cover-play-overlay { opacity: 1; transform: translateY(0); }
    .sub-title { font-size: 14px; font-weight: 600; color: #0F172A; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sub-author { font-size: 12px; color: #64748B; font-weight: 500; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sub-meta { display: flex; align-items: center; gap: 8px; }
    .sub-badge { background: rgba(56,189,248,0.1); padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; color: #38BDF8; }
    .sub-episodes { font-size: 11px; color: #94A3B8; }
    .empty-state { text-align: center; padding: 60px 20px; color: #94A3B8; }
    .empty-state a { color: #38BDF8; text-decoration: none; font-weight: 600; }
    /* Player bar */
    .player-bar { position: fixed; bottom: 0; left: var(--sidebar); right: 0; height: var(--player-h); background: #fff; border-top: 1px solid #E2E8F0; display: flex; align-items: center; padding: 0 24px; z-index: 100; }
    .player-track { display: flex; align-items: center; gap: 14px; width: 280px; }
    .player-art { width: 48px; height: 48px; border-radius: 10px; background: linear-gradient(135deg, #1E293B, #0F172A); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .player-track-info { min-width: 0; }
    .player-track-title { font-size: 13px; font-weight: 600; color: #0F172A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .player-track-author { font-size: 12px; color: #64748B; font-weight: 500; }
    .player-controls { display: flex; align-items: center; gap: 6px; margin: 0 auto; }
    .ctrl-btn { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; background: transparent; color: #64748B; cursor: pointer; transition: all 0.15s; }
    .ctrl-btn:hover { color: #0F172A; background: #F1F5F9; }
    .ctrl-btn.play-btn { width: 42px; height: 42px; background: #38BDF8; color: #fff; box-shadow: 0 2px 8px rgba(56,189,248,0.3); }
    /* Loading */
    .loading-overlay { position: fixed; inset: 0; background: #F8FAFC; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; transition: opacity 0.3s; }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-overlay .spinner { width: 40px; height: 40px; border: 3px solid #E2E8F0; border-top-color: #38BDF8; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay p { font-size: 14px; color: #64748B; font-weight: 500; }
    /* Mobile */
    @media (max-width: 768px) { .sidebar { display: none; } .main-area { margin-left: 0; } .player-bar { left: 0; } .content { padding: 20px 16px; } .sub-card { width: 150px; } .sub-cover { width: 150px; height: 150px; } .sub-grid { gap: 16px; } .mobile-nav { display: flex; position: fixed; bottom: var(--player-h); left: 0; right: 0; height: 56px; background: #fff; border-top: 1px solid #E2E8F0; z-index: 99; align-items: center; justify-content: space-around; padding: 0 8px; } }
    @media (min-width: 769px) { .mobile-nav { display: none; } }
    .mobile-nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 10px; border-radius: 8px; border: none; background: transparent; cursor: pointer; color: #94A3B8; font-size: 10px; font-weight: 600; font-family: inherit; }
    .mobile-nav-item.active { color: #38BDF8; }
    .icon-btn { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; background: transparent; color: #64748B; }
    .icon-btn:hover { background: #F1F5F9; color: #0F172A; }
    .topbar-icons { display: flex; align-items: center; gap: 8px; }
    .search-wrapper { display: flex; align-items: center; background: #F1F5F9; border-radius: 10px; padding: 0 14px; width: 320px; border: 1px solid transparent; }
    .search-wrapper:focus-within { border-color: #38BDF8; background: #fff; }
    .search-wrapper input { flex: 1; padding: 10px 10px; font-size: 14px; color: #0F172A; background: transparent; border: none; outline: none; font-family: inherit; }
    .search-wrapper input::placeholder { color: #94A3B8; }
  </style>
  <script src="navigate.js"></script>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Loading subscriptions...</p>
  </div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#38BDF8" stroke-width="1.8"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/><circle cx="12" cy="12" r="2"/></svg>
      <span>SoundWave <small>Discovery</small></span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item" onclick="navigate('/home')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</button>
      <button class="nav-item" onclick="navigate('/browse')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>Discover</button>
      <button class="nav-item" onclick="navigate('/library')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>Library</button>
      <button class="nav-item" onclick="navigate('/history')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>History</button>
      <button class="nav-item" onclick="navigate('/profile')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" id="signOutBtn" style="color:#EF4444;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div class="search-wrapper">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Search subscriptions..." id="topSearch" />
      </div>
      <div class="topbar-icons">
        <button class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></button>
        <div class="avatar" id="userAvatar">U</div>
      </div>
    </header>

    <main class="content" id="mainContent">
      <div class="page-header">
        <h1>Subscriptions</h1>
        <button class="sort-btn" id="sortBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg>Sort</button>
      </div>

      <!-- New Releases -->
      <div class="section">
        <div class="section-header">
          <h2>New Releases</h2>
          <a href="#">See All</a>
        </div>
        <div class="release-list" id="newReleaseList"></div>
        <div class="empty-state" id="releasesEmpty" style="display:none;">
          <p>No new releases. <a href="/browse">Find more podcasts!</a></p>
        </div>
      </div>

      <!-- All Subscriptions -->
      <div class="section">
        <div class="section-header">
          <h2>All Subscriptions</h2>
          <span class="count" id="subCount">0 podcasts</span>
        </div>
        <div class="sub-grid" id="subscriptionsGrid"></div>
        <div class="empty-state" id="subsEmpty" style="display:none;">
          <p>Not subscribed to any podcasts yet. <a href="/browse">Discover podcasts!</a></p>
        </div>
      </div>
    </main>
  </div>

  <div class="player-bar">
    <div class="player-track">
      <div class="player-art"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/></svg></div>
      <div class="player-track-info"><div class="player-track-title">Subscriptions</div><div class="player-track-author">Your followed podcasts</div></div>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
      <button class="ctrl-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M18.07 12a5.03 5.03 0 0 0-1.11-2.96"/><path d="M22 12a9.03 9.03 0 0 0-3.29-6.96"/></svg></button>
      <button class="ctrl-btn play-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></button>
      <button class="ctrl-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13 5 18 9h4v6h-4l-5 4V5z"/><path d="M5.93 12a5.03 5.03 0 0 0 1.11 2.96"/><path d="M2 12a9.03 9.03 0 0 0 3.29 6.96"/></svg></button>
      <button class="ctrl-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
    </div>
  </div>

  <nav class="mobile-nav">
    <button class="mobile-nav-item" onclick="navigate('/home')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</button>
    <button class="mobile-nav-item" onclick="navigate('/browse')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>Explore</button>
    <button class="mobile-nav-item" onclick="navigate('/library')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>Library</button>
    <button class="mobile-nav-item" onclick="navigate('/history')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>History</button>
  </nav>

<script>
  var gradients = ['#1E293B,#0F172A','#1E3A5F,#0C2233','#2D1B69,#1A0D3B','#5B1E3A,#2E0F1D','#1B4D3E,#0D2B22','#6B3A1E,#3D1F0F'];

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function getTimeAgo(date) { if (!date) return ''; var sec = Math.floor((Date.now() - new Date(date)) / 1000); if (sec < 60) return 'just now'; var min = Math.floor(sec / 60); if (min < 60) return min + ' min ago'; var hr = Math.floor(min / 60); if (hr < 24) return hr + ' hour' + (hr > 1 ? 's' : '') + ' ago'; var d = Math.floor(hr / 24); return d + ' day' + (d > 1 ? 's' : '') + ' ago'; }
  function formatDuration(dur) { if (dur == null) return '0:00'; if (typeof dur === 'number') { var m = Math.floor(dur / 60); var s = Math.floor(dur % 60); return m + ':' + (s < 10 ? '0' : '') + s; } var parts = dur.split(':'); if (parts.length === 2) return dur; var totalSec = parseInt(dur, 10); if (isNaN(totalSec)) return '0:00'; var m = Math.floor(totalSec / 60); var s = totalSec % 60; return m + ':' + (s < 10 ? '0' : '') + s; }

  function initApp() {
    var user = PUBLIC_API.getUser();
    if (!user) { PUBLIC_API.logout(); return; }
    onReady(user);
  }

  function onReady(user) {
    var initial = (user.display_name || user.email || 'U')[0].toUpperCase();
    document.getElementById('userAvatar').textContent = initial;
    var ov = document.getElementById('loadingOverlay'); if (ov) ov.classList.add('hidden');
    document.getElementById('signOutBtn').addEventListener('click', function() { PUBLIC_API.logout(); });

    document.getElementById('topSearch').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && this.value.trim().length >= 3) {
        navigate('/browse?q=' + encodeURIComponent(this.value.trim()));
      }
    });

    loadSubscriptions();
    loadNewReleases();
  }

  async function loadSubscriptions() {
    try {
      var json = await PUBLIC_API.get('/api/follows');
      var list = json.data || [];
      var container = document.getElementById('subscriptionsGrid');
      var empty = document.getElementById('subsEmpty');

      document.getElementById('subCount').textContent = list.length + ' podcast' + (list.length !== 1 ? 's' : '');

      if (list.length === 0) { container.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      list.forEach(function(p) {
        var idx = (p.id || '').split('').reduce(function(a,c){return a+c.charCodeAt(0);},0) % gradients.length;
        var category = p.category || 'Podcast';
        var episodes = p.episodes_count || '0';
        container.innerHTML +=
          '<div class="sub-card" onclick="navigate(\'/podcast?id=' + encodeURIComponent(p.id) + '\')">' +
            '<div class="sub-cover">' +
              '<div class="cover-bg" style="background:linear-gradient(135deg,' + gradients[idx] + ');">' +
                '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5">' +
                  '<path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/>' +
                '</svg>' +
              '</div>' +
              '<div class="cover-play-overlay"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></div>' +
            '</div>' +
            '<div class="sub-title">' + esc(p.title) + '</div>' +
            '<div class="sub-author">' + esc(p.author || '') + '</div>' +
            '<div class="sub-meta">' +
              '<span class="sub-badge">' + esc(category) + '</span>' +
              '<span class="sub-episodes">' + episodes + ' ep.</span>' +
            '</div>' +
          '</div>';
      });
    } catch (e) { console.warn('[Subscriptions]', e); }
  }

  async function loadNewReleases() {
    try {
      var resp = await fetch('/api/episodes/recent');
      var json = await resp.json();
      var list = json.data || [];
      var container = document.getElementById('newReleaseList');
      var empty = document.getElementById('releasesEmpty');
      if (list.length === 0) { container.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.slice(0, 5).forEach(function(e) {
        var podcastTitle = (e.podcasts && e.podcasts.title) || 'Podcast';
        var idx = (e.id || '').split('').reduce(function(a,c){return a+c.charCodeAt(0);},0) % gradients.length;
        container.innerHTML +=
          '<div class="release-row" onclick="navigate(\'/podcast?id=' + encodeURIComponent(e.podcast_id) + '\')">' +
            '<div class="release-icon" style="background:linear-gradient(135deg,' + gradients[idx] + ');">' +
              '<svg width="20" height="20" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)"><polygon points="5,3 19,12 5,21"/></svg>' +
            '</div>' +
            '<div class="release-info">' +
              '<div class="r-title">' + esc(e.title) + '</div>' +
              '<div class="r-meta">' + esc(podcastTitle) + ' \u00B7 ' + formatDuration(e.duration) + '</div>' +
            '</div>' +
            '<div class="release-date">' + getTimeAgo(e.published_at) + '</div>' +
          '</div>';
      });
    } catch (e) { console.warn('[Releases]', e); }
  }

  initApp();
</script>
</body>
</html>
