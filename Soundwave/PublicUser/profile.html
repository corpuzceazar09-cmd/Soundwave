<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundWave - Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --sidebar: 240px; --player-h: 80px; --topbar-h: 64px; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #F8FAFC; color: #0F172A; min-height: 100vh; display: flex; }
    .sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar); height: 100vh; background: #0F172A; display: flex; flex-direction: column; z-index: 100; border-right: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 20px 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand span { font-size: 15px; font-weight: 700; color: #fff; }
    .sidebar-brand span small { display: block; font-size: 10px; font-weight: 500; color: #38BDF8; }
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; color: #64748B; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: transparent; font-family: inherit; width: 100%; text-align: left; transition: all 0.15s; }
    .nav-item:hover { color: #CBD5E1; background: rgba(255,255,255,0.05); }
    .nav-item.active { color: #fff; background: rgba(56,189,248,0.15); }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    .main-area { margin-left: var(--sidebar); width: calc(100% - var(--sidebar)); padding-bottom: var(--player-h); min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { height: var(--topbar-h); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; background: #fff; border-bottom: 1px solid #E2E8F0; position: sticky; top: 0; z-index: 50; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #38BDF8, #818CF8); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; margin-left: 4px; }
    .content { flex: 1; padding: 28px 32px 32px; overflow-y: auto; }
    .content h1 { font-size: 28px; font-weight: 900; }
    /* Profile Header */
    .profile-header { display: flex; align-items: center; gap: 24px; margin-bottom: 32px; padding-bottom: 28px; border-bottom: 1px solid #E2E8F0; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #38BDF8, #818CF8); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 32px; font-weight: 800; flex-shrink: 0; overflow: hidden; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-info h2 { font-size: 24px; font-weight: 800; color: #0F172A; margin-bottom: 4px; }
    .profile-info .email { font-size: 14px; color: #64748B; font-weight: 500; }
    /* Tabs */
    .profile-tabs { display: flex; gap: 0; border-bottom: 2px solid #E2E8F0; margin-bottom: 24px; }
    .profile-tab { padding: 12px 24px; font-size: 14px; font-weight: 600; color: #64748B; cursor: pointer; border: none; background: transparent; font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
    .profile-tab:hover { color: #0F172A; }
    .profile-tab.active { color: #38BDF8; border-bottom-color: #38BDF8; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    /* Activity list */
    .activity-list { display: flex; flex-direction: column; gap: 8px; }
    .activity-item { display: flex; align-items: center; gap: 16px; padding: 12px 16px; border-radius: 12px; transition: background 0.15s; }
    .activity-item:hover { background: #F1F5F9; }
    .activity-icon { width: 40px; height: 40px; border-radius: 10px; background: #F1F5F9; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .activity-info { flex: 1; min-width: 0; }
    .activity-info .act-title { font-size: 14px; font-weight: 600; color: #0F172A; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .activity-info .act-meta { font-size: 12px; color: #64748B; font-weight: 500; }
    /* Podcast cards */
    .podcast-grid { display: flex; flex-wrap: wrap; gap: 20px; }
    .podcast-card { width: 180px; cursor: pointer; transition: transform 0.15s; }
    .podcast-card:hover { transform: translateY(-4px); }
    .podcast-cover { width: 180px; height: 180px; border-radius: 14px; margin-bottom: 12px; position: relative; overflow: hidden; }
    .podcast-cover .cover-bg { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .cover-play-overlay { position: absolute; bottom: 10px; right: 10px; width: 40px; height: 40px; border-radius: 50%; background: #38BDF8; display: flex; align-items: center; justify-content: center; opacity: 0; transform: translateY(6px); transition: all 0.2s; box-shadow: 0 4px 12px rgba(56,189,248,0.4); }
    .podcast-card:hover .cover-play-overlay { opacity: 1; transform: translateY(0); }
    .podcast-title { font-size: 14px; font-weight: 600; color: #0F172A; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .podcast-author { font-size: 12px; color: #64748B; font-weight: 500; }
    .empty-state { text-align: center; padding: 60px 20px; color: #94A3B8; }
    .empty-state a { color: #38BDF8; text-decoration: none; font-weight: 600; }
    .empty-state a:hover { text-decoration: underline; }
    /* Player bar */
    .player-bar { position: fixed; bottom: 0; left: var(--sidebar); right: 0; height: var(--player-h); background: #fff; border-top: 1px solid #E2E8F0; display: flex; align-items: center; padding: 0 24px; z-index: 100; }
    .player-track { display: flex; align-items: center; gap: 14px; width: 280px; }
    .player-art { width: 48px; height: 48px; border-radius: 10px; background: linear-gradient(135deg, #1E293B, #0F172A); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .player-track-info { min-width: 0; }
    .player-track-title { font-size: 13px; font-weight: 600; color: #0F172A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .player-track-author { font-size: 12px; color: #64748B; font-weight: 500; }
    .player-controls { display: flex; align-items: center; gap: 6px; margin: 0 auto; }
    .ctrl-btn { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; background: transparent; color: #64748B; cursor: pointer; transition: all 0.15s; }
    .ctrl-btn:hover { color: #0F172A; background: #F1F5F9; }
    .ctrl-btn.play-btn { width: 42px; height: 42px; background: #38BDF8; color: #fff; box-shadow: 0 2px 8px rgba(56,189,248,0.3); }
    /* Loading */
    .loading-overlay { position: fixed; inset: 0; background: #F8FAFC; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; transition: opacity 0.3s; }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-overlay .spinner { width: 40px; height: 40px; border: 3px solid #E2E8F0; border-top-color: #38BDF8; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay p { font-size: 14px; color: #64748B; font-weight: 500; }
    /* Mobile */
    @media (max-width: 768px) { .sidebar { display: none; } .main-area { margin-left: 0; } .player-bar { left: 0; } .content { padding: 20px 16px; } .profile-header { flex-direction: column; text-align: center; } .podcast-card { width: 150px; } .podcast-cover { width: 150px; height: 150px; } .mobile-nav { display: flex; position: fixed; bottom: var(--player-h); left: 0; right: 0; height: 56px; background: #fff; border-top: 1px solid #E2E8F0; z-index: 99; align-items: center; justify-content: space-around; padding: 0 8px; } }
    @media (min-width: 769px) { .mobile-nav { display: none; } }
    .mobile-nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 10px; border-radius: 8px; border: none; background: transparent; cursor: pointer; color: #94A3B8; font-size: 10px; font-weight: 600; font-family: inherit; }
    .mobile-nav-item.active { color: #38BDF8; }
    .icon-btn { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; background: transparent; color: #64748B; }
    .icon-btn:hover { background: #F1F5F9; color: #0F172A; }
    .topbar-icons { display: flex; align-items: center; gap: 8px; }
    .search-wrapper { display: flex; align-items: center; background: #F1F5F9; border-radius: 10px; padding: 0 14px; width: 320px; border: 1px solid transparent; }
    .search-wrapper:focus-within { border-color: #38BDF8; background: #fff; }
    .search-wrapper input { flex: 1; padding: 10px 10px; font-size: 14px; color: #0F172A; background: transparent; border: none; outline: none; font-family: inherit; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-header h2 { font-size: 20px; font-weight: 800; }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Loading profile...</p>
  </div>

  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#38BDF8" stroke-width="1.8"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/><circle cx="12" cy="12" r="2"/></svg>
      <span>SoundWave <small>Discovery</small></span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item" onclick="location.href='/home'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</button>
      <button class="nav-item" onclick="location.href='/browse'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>Discover</button>
      <button class="nav-item" onclick="location.href='/profile'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>Library</button>
      <button class="nav-item" onclick="location.href='/profile'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m10 15 9-9M13 6h5v5"/><path d="M21 12v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h5"/></svg>Subscriptions</button>
      <button class="nav-item" onclick="location.href='/profile'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>History</button>
      <button class="nav-item" onclick="location.href='/profile'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" id="signOutBtn" style="color:#EF4444;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <div class="search-wrapper">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Search..." id="topSearch" />
      </div>
      <div class="topbar-icons">
        <button class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></button>
        <div class="avatar" id="userAvatar">U</div>
      </div>
    </header>

    <main class="content">
      <!-- Profile Header -->
      <div class="profile-header">
        <div class="profile-avatar" id="profileAvatar">
          <span id="avatarInitial">U</span>
        </div>
        <div class="profile-info">
          <h2 id="profileName">User</h2>
          <div class="email" id="profileEmail">user@example.com</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="profile-tabs">
        <button class="profile-tab active" data-tab="history">History</button>
        <button class="profile-tab" data-tab="subscriptions">Subscriptions</button>
      </div>

      <!-- History Tab -->
      <div class="tab-content active" id="tabHistory">
        <div class="section-header"><h2>Listening History</h2></div>
        <div class="activity-list" id="historyList"></div>
        <div class="empty-state" id="historyEmpty" style="display:none;">
          <p>No listening history yet. <a href="/browse">Start exploring!</a></p>
        </div>
      </div>

      <!-- Subscriptions Tab -->
      <div class="tab-content" id="tabSubscriptions">
        <div class="section-header"><h2>Subscribed Podcasts</h2></div>
        <div class="podcast-grid" id="subscriptionsGrid"></div>
        <div class="empty-state" id="subsEmpty" style="display:none;">
          <p>Not following any podcasts yet. <a href="/browse">Discover podcasts!</a></p>
        </div>
      </div>
    </main>
  </div>

  <div class="player-bar">
    <div class="player-track">
      <div class="player-art"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/></svg></div>
      <div class="player-track-info"><div class="player-track-title">Your profile</div><div class="player-track-author">Manage your library</div></div>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
      <button class="ctrl-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M18.07 12a5.03 5.03 0 0 0-1.11-2.96"/><path d="M22 12a9.03 9.03 0 0 0-3.29-6.96"/></svg></button>
      <button class="ctrl-btn play-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></button>
      <button class="ctrl-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13 5 18 9h4v6h-4l-5 4V5z"/><path d="M5.93 12a5.03 5.03 0 0 0 1.11 2.96"/><path d="M2 12a9.03 9.03 0 0 0 3.29 6.96"/></svg></button>
      <button class="ctrl-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
    </div>
  </div>

  <nav class="mobile-nav">
    <button class="mobile-nav-item" onclick="location.href='/home'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</button>
    <button class="mobile-nav-item" onclick="location.href='/browse'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>Explore</button>
    <button class="mobile-nav-item" onclick="location.href='/profile'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>Library</button>
    <button class="mobile-nav-item" onclick="location.href='/profile'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>History</button>
  </nav>

<script>
  var currentUser = null;
  var gradients = ['#1E293B,#0F172A','#1E3A5F,#0C2233','#2D1B69,#1A0D3B','#5B1E3A,#2E0F1D','#1B4D3E,#0D2B22','#6B3A1E,#3D1F0F'];

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function getTimeAgo(date) { if (!date) return ''; var sec = Math.floor((Date.now() - new Date(date)) / 1000); if (sec < 60) return 'just now'; var min = Math.floor(sec / 60); if (min < 60) return min + ' min ago'; var hr = Math.floor(min / 60); if (hr < 24) return hr + ' hour' + (hr > 1 ? 's' : '') + ' ago'; var d = Math.floor(hr / 24); return d + ' day' + (d > 1 ? 's' : '') + ' ago'; }

  async function initFirebase() {
    try {
      var resp = await fetch('/api/config');
      var config = await resp.json();
      firebase.initializeApp(config);
      firebase.auth().onAuthStateChanged(function(user) {
        if (user) { currentUser = user; onReady(user); }
        else { window.location.href = '/auth'; }
      });
    } catch (err) {
      console.error('[Init]', err);
      document.getElementById('loadingOverlay').querySelector('p').textContent = 'Connection failed...';
      setTimeout(function() { window.location.href = '/auth'; }, 1500);
    }
  }

  function onReady(user) {
    // Profile info
    var name = user.displayName || 'User';
    var email = user.email || '';
    var initial = (user.displayName || user.email || 'U')[0].toUpperCase();
    document.getElementById('avatarInitial').textContent = initial;
    document.getElementById('userAvatar').textContent = initial;
    document.getElementById('profileName').textContent = name;
    document.getElementById('profileEmail').textContent = email;

    if (user.photoURL) {
      document.getElementById('avatarInitial').style.display = 'none';
      document.getElementById('profileAvatar').innerHTML = '<img src="' + esc(user.photoURL) + '" alt="Avatar" />';
    }

    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('signOutBtn').addEventListener('click', function() { firebase.auth().signOut(); });

    // Tab switching
    document.querySelectorAll('.profile-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.profile-tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.tab-content').forEach(function(tc) { tc.classList.remove('active'); });
        tab.classList.add('active');
        document.getElementById('tab' + tab.getAttribute('data-tab').charAt(0).toUpperCase() + tab.getAttribute('data-tab').slice(1)).classList.add('active');
      });
    });

    // Load data
    loadHistory(user.uid);
    loadSubscriptions(user.uid);

    document.getElementById('topSearch').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && this.value.trim().length >= 3) {
        window.location.href = '/browse?q=' + encodeURIComponent(this.value.trim());
      }
    });
  }

  async function loadHistory(uid) {
    try {
      var resp = await fetch('/api/activity/' + encodeURIComponent(uid));
      var json = await resp.json();
      var list = json.data || [];
      var container = document.getElementById('historyList');
      var empty = document.getElementById('historyEmpty');

      if (list.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      list.forEach(function(item) {
        var epTitle = (item.episodes && item.episodes.title) || 'Episode';
        var podcastTitle = (item.podcasts && item.podcasts.title) || 'Podcast';
        container.innerHTML +=
          '<div class="activity-item">' +
            '<div class="activity-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2"><polygon points="5,3 19,12 5,21"/></svg></div>' +
            '<div class="activity-info">' +
              '<div class="act-title">' + esc(epTitle) + '</div>' +
              '<div class="act-meta">' + esc(podcastTitle) + ' \u00B7 ' + getTimeAgo(item.created_at) + '</div>' +
            '</div>' +
          '</div>';
      });
    } catch (e) { console.warn('[History]', e); }
  }

  async function loadSubscriptions(uid) {
    try {
      var resp = await fetch('/api/follows/' + encodeURIComponent(uid));
      var json = await resp.json();
      var list = json.data || [];
      var grid = document.getElementById('subscriptionsGrid');
      var empty = document.getElementById('subsEmpty');

      if (list.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      list.forEach(function(p) {
        var idx = (p.id || '').split('').reduce(function(a,c){return a+c.charCodeAt(0);},0) % gradients.length;
        grid.innerHTML +=
          '<div class="podcast-card" onclick="location.href=\'/podcast?id=' + encodeURIComponent(p.id) + '\'">' +
            '<div class="podcast-cover"><div class="cover-bg" style="background:linear-gradient(135deg,' + gradients[idx] + ');">' +
              '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/></svg>' +
            '</div><div class="cover-play-overlay"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></div></div>' +
            '<div class="podcast-title">' + esc(p.title) + '</div>' +
            '<div class="podcast-author">' + esc(p.author || '') + '</div>' +
          '</div>';
      });
    } catch (e) { console.warn('[Subscriptions]', e); }
  }

  initFirebase();
</script>
</body>
</html>
