<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundWave - Podcast</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="auth.js"></script>
  <script src="player.js"></script>
  <script src="navigate.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --sidebar: 240px; --player-h: 80px; --topbar-h: 64px; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F8FAFC; color: #0F172A; min-height: 100vh; display: flex;
    }
    .sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar); height: 100vh; background: #0F172A; display: flex; flex-direction: column; z-index: 100; border-right: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 20px 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand svg { flex-shrink: 0; }
    .sidebar-brand span { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.3px; line-height: 1.2; }
    .sidebar-brand span small { display: block; font-size: 10px; font-weight: 500; color: #38BDF8; letter-spacing: 0.3px; }
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; color: #64748B; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: transparent; font-family: inherit; width: 100%; text-align: left; transition: all 0.15s; }
    .nav-item:hover { color: #CBD5E1; background: rgba(255,255,255,0.05); }
    .nav-item.active { color: #fff; background: rgba(56,189,248,0.15); }
    .nav-item.active svg { color: #38BDF8; }
    .nav-item svg { flex-shrink: 0; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    .sidebar-footer .nav-item { font-size: 13px; }
    .main-area { margin-left: var(--sidebar); width: calc(100% - var(--sidebar)); padding-bottom: var(--player-h); min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { height: var(--topbar-h); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; background: #fff; border-bottom: 1px solid #E2E8F0; position: sticky; top: 0; z-index: 50; }
    .search-wrapper { display: flex; align-items: center; background: #F1F5F9; border-radius: 10px; padding: 0 14px; width: 320px; border: 1px solid transparent; transition: border-color 0.2s; }
    .search-wrapper:focus-within { border-color: #38BDF8; background: #fff; }
    .search-wrapper input { flex: 1; padding: 10px 10px; font-size: 14px; color: #0F172A; background: transparent; border: none; outline: none; font-family: inherit; }
    .search-wrapper input::placeholder { color: #94A3B8; }
    .topbar-icons { display: flex; align-items: center; gap: 8px; }
    .icon-btn { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; background: transparent; color: #64748B; transition: all 0.15s; }
    .icon-btn:hover { background: #F1F5F9; color: #0F172A; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #38BDF8, #818CF8); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; margin-left: 4px; }
    .content { flex: 1; padding: 28px 32px 32px; overflow-y: auto; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; color: #64748B; text-decoration: none; margin-bottom: 24px; cursor: pointer; }
    .back-link:hover { color: #38BDF8; }
    /* Podcast Hero */
    .podcast-hero { display: flex; gap: 32px; margin-bottom: 36px; }
    .podcast-cover-lg { width: 260px; height: 260px; border-radius: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .podcast-cover-lg .cover-bg { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .podcast-info { flex: 1; min-width: 0; }
    .podcast-info h1 { font-size: 32px; font-weight: 900; color: #0F172A; margin-bottom: 6px; line-height: 1.15; }
    .podcast-info .author { font-size: 16px; color: #64748B; font-weight: 600; margin-bottom: 12px; }
    .podcast-info .category-badge { display: inline-block; padding: 4px 12px; border-radius: 999px; background: rgba(56,189,248,0.1); color: #38BDF8; font-size: 12px; font-weight: 700; margin-bottom: 14px; }
    .podcast-info .description { font-size: 15px; color: #475569; line-height: 1.7; margin-bottom: 20px; }
    .podcast-stats { display: flex; gap: 24px; margin-bottom: 20px; }
    .podcast-stats .stat { font-size: 13px; color: #64748B; }
    .podcast-stats .stat strong { color: #0F172A; font-weight: 700; }
    .podcast-actions { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .follow-btn { padding: 10px 28px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; font-family: inherit; transition: all 0.15s; }
    .follow-btn.not-following { background: #38BDF8; color: #fff; }
    .follow-btn.not-following:hover { background: #0EA5E9; }
    .follow-btn.following { background: #E2E8F0; color: #475569; }
    .follow-btn.following:hover { background: #FEE2E2; color: #EF4444; }
    /* Star Rating */
    .star-rating { display: flex; align-items: center; gap: 2px; }
    .star-rating .star { cursor: pointer; transition: transform 0.1s; }
    .star-rating .star:hover { transform: scale(1.2); }
    .star-rating .star.active svg { fill: #F59E0B; stroke: #F59E0B; }
    .star-rating .star.inactive svg { fill: none; stroke: #CBD5E1; }
    .rating-label { font-size: 13px; color: #64748B; font-weight: 500; margin-left: 8px; }
    /* Episodes */
    .episodes-section { margin-top: 8px; }
    .episodes-section h2 { font-size: 22px; font-weight: 800; margin-bottom: 20px; }
    .episode-list { display: flex; flex-direction: column; gap: 8px; }
    .episode-row { display: flex; align-items: center; gap: 16px; padding: 12px 16px; border-radius: 12px; cursor: pointer; transition: background 0.15s; }
    .episode-row:hover { background: #F1F5F9; }
    .episode-num { width: 28px; font-size: 13px; font-weight: 600; color: #94A3B8; text-align: center; flex-shrink: 0; }
    .episode-info { flex: 1; min-width: 0; }
    .episode-info .ep-title { font-size: 14px; font-weight: 600; color: #0F172A; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .episode-info .ep-meta { font-size: 12px; color: #64748B; font-weight: 500; }
    .episode-dur { font-size: 13px; color: #94A3B8; font-weight: 500; }
    .episode-play { width: 34px; height: 34px; border-radius: 50%; background: #E2E8F0; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
    .episode-play:hover { background: #CBD5E1; }
    /* Player bar */
    .player-bar { position: fixed; bottom: 0; left: var(--sidebar); right: 0; height: var(--player-h); background: #fff; border-top: 1px solid #E2E8F0; display: flex; align-items: center; padding: 0 20px; z-index: 100; gap: 12px; }
    .player-track { display: flex; align-items: center; gap: 12px; min-width: 200px; flex: 0 0 220px; }
    .player-art { width: 48px; height: 48px; border-radius: 10px; background: linear-gradient(135deg, #1E293B, #0F172A); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .player-track-info { min-width: 0; flex: 1; }
    .player-track-title { font-size: 13px; font-weight: 600; color: #0F172A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .player-track-author { font-size: 12px; color: #64748B; font-weight: 500; }
    /* Center controls + progress */
    .player-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .player-controls { display: flex; align-items: center; gap: 4px; }
    .ctrl-btn { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; background: transparent; color: #64748B; cursor: pointer; transition: all 0.15s; font-size: 11px; font-weight: 700; font-family: inherit; }
    .ctrl-btn:hover { color: #0F172A; background: #F1F5F9; }
    .ctrl-btn.play-btn { width: 42px; height: 42px; background: #38BDF8; color: #fff; box-shadow: 0 2px 8px rgba(56,189,248,0.3); }
    .ctrl-btn.play-btn:hover { background: #0EA5E9; }
    .ctrl-btn.skip-label { width: auto; padding: 0 4px; border-radius: 6px; font-size: 10px; font-weight: 700; }
    /* Speed button */
    .speed-btn { height: 26px; padding: 0 8px; border-radius: 6px; border: 1.5px solid #CBD5E1; background: transparent; color: #475569; font-size: 11px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.15s; }
    .speed-btn:hover { border-color: #38BDF8; color: #38BDF8; }
    /* Progress row */
    .player-progress-row { display: flex; align-items: center; gap: 8px; width: 100%; }
    .player-time { font-size: 11px; color: #94A3B8; font-weight: 500; min-width: 36px; }
    .player-time.right { text-align: right; }
    .player-progress-bar { flex: 1; height: 4px; border-radius: 3px; background: #E2E8F0; cursor: pointer; position: relative; }
    .player-progress-bar:hover { height: 6px; margin: -1px 0; }
    .player-progress-fill { height: 100%; border-radius: 3px; background: #38BDF8; position: relative; transition: width 0.1s linear; }
    .player-progress-fill::after { content: ''; position: absolute; right: -5px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; border-radius: 50%; background: #38BDF8; opacity: 0; transition: opacity 0.15s; }
    .player-progress-bar:hover .player-progress-fill::after { opacity: 1; }
    /* Right extras */
    .player-extras { display: flex; align-items: center; gap: 6px; flex: 0 0 180px; justify-content: flex-end; }
    .ext-btn { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; color: #64748B; cursor: pointer; transition: all 0.15s; }
    .ext-btn:hover { color: #0F172A; background: #F1F5F9; }
    .volume-row { display: flex; align-items: center; gap: 6px; }
    .volume-slider { width: 70px; height: 4px; border-radius: 3px; background: #E2E8F0; cursor: pointer; position: relative; }
    .volume-slider:hover { height: 6px; }
    .volume-slider-fill { height: 100%; border-radius: 3px; background: #64748B; width: 100%; }
    /* Active episode row */
    .episode-row.playing { background: rgba(56,189,248,0.08); }
    .episode-row.playing .ep-title { color: #38BDF8; }
    /* Mobile */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-area { margin-left: 0; width: 100%; }
      .player-bar { left: 0; }
      .topbar { padding: 0 16px; }
      .search-wrapper { width: 200px; }
      .content { padding: 20px 16px 32px; }
      .podcast-hero { flex-direction: column; gap: 20px; }
      .podcast-cover-lg { width: 180px; height: 180px; }
      .podcast-info h1 { font-size: 24px; }
      .player-track { flex: 0 0 140px; }
      .player-extras { display: none; }
      .mobile-nav { display: flex; position: fixed; bottom: var(--player-h); left: 0; right: 0; height: 56px; background: #fff; border-top: 1px solid #E2E8F0; z-index: 99; align-items: center; justify-content: space-around; padding: 0 8px; }
    }
    @media (min-width: 769px) { .mobile-nav { display: none; } }
    /* Loading spinner */
    .loading-spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; }
    .loading-spinner .spinner { width: 36px; height: 36px; border: 3px solid #E2E8F0; border-top-color: #38BDF8; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-spinner span { font-size: 14px; color: #94A3B8; font-weight: 500; }
    .loading-error { padding: 60px 20px; text-align: center; color: #94A3B8; font-size: 15px; }
    .mobile-nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 10px; border-radius: 8px; border: none; background: transparent; cursor: pointer; color: #94A3B8; font-size: 10px; font-weight: 600; font-family: inherit; transition: all 0.15s; }
    .mobile-nav-item.active { color: #38BDF8; }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#38BDF8" stroke-width="1.8"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/><circle cx="12" cy="12" r="2"/></svg>
      <span>SoundWave <small>Discovery</small></span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item" onclick="navigate('/home')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</button>
      <button class="nav-item" onclick="navigate('/browse')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>Discover</button>
      <button class="nav-item" onclick="navigate('/library')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>Library</button>

      <button class="nav-item" onclick="navigate('/history')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>History</button>
      <button class="nav-item" onclick="navigate('/profile')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" id="signOutBtn" style="color:#EF4444;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <header class="topbar">
      <div class="search-wrapper">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Search podcasts, episodes..." id="topSearch" />
      </div>
      <div class="topbar-icons">
        <button class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></button>
        <button class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
        <div class="avatar" id="userAvatar">U</div>
      </div>
    </header>

    <main class="content" id="mainContent">
      <a class="back-link" href="/home" id="backLink">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Home
      </a>

      <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div>
        <span>Loading podcast...</span>
      </div>

      <!-- Podcast Hero -->
      <div class="podcast-hero" id="podcastHero">
        <div class="podcast-cover-lg" id="podcastCover">
          <div class="cover-bg">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5">
              <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/>
              <path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/>
            </svg>
          </div>
        </div>
        <div class="podcast-info">
          <h1 id="podcastTitle">Podcast Title</h1>
          <div class="author" id="podcastAuthor">Author</div>
          <div class="category-badge" id="podcastCategory">Category</div>
          <p class="description" id="podcastDesc">Description</p>
          <div class="podcast-stats">
            <span class="stat"><strong id="episodeCount">0</strong> Episodes</span>
            <span class="stat"><strong id="followerCount">0</strong> Followers</span>
            <span class="stat" id="releaseInfo">Recent</span>
          </div>
          <div class="podcast-actions">
            <button class="follow-btn not-following" id="followBtn">+ Follow</button>
            <div class="star-rating" id="starRating"></div>
            <span class="rating-label" id="ratingLabel">Rate this podcast</span>
          </div>
        </div>
      </div>

      <!-- Episodes -->
      <section class="episodes-section">
        <h2>Episodes</h2>
        <div class="episode-list" id="episodeList"></div>
      </section>
    </main>
  </div>

  <!-- Player Bar (full Spotify-like controls) -->
  <div class="player-bar">
    <!-- Track info -->
    <div class="player-track">
      <div class="player-art" id="playerArt">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/></svg>
      </div>
      <div class="player-track-info">
        <div class="player-track-title" id="playerTrackTitle">Select an episode</div>
        <div class="player-track-author" id="playerTrackAuthor">Tap play to listen</div>
      </div>
    </div>

    <!-- Center: controls + progress -->
    <div class="player-center">
      <div class="player-controls">
        <!-- Prev episode -->
        <button class="ctrl-btn" id="playerPrev" title="Previous episode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
        </button>
        <!-- Skip back 15s -->
        <button class="ctrl-btn" id="playerSkipBack" title="Rewind 15 seconds">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/><text x="7" y="14" font-size="6" font-weight="bold" fill="currentColor" stroke="none">15</text></svg>
        </button>
        <!-- Play / Pause -->
        <button class="ctrl-btn play-btn" id="playerPlayBtn" title="Play / Pause">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <!-- Skip forward 30s -->
        <button class="ctrl-btn" id="playerSkipForward" title="Forward 30 seconds">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/><text x="7" y="14" font-size="6" font-weight="bold" fill="currentColor" stroke="none">30</text></svg>
        </button>
        <!-- Next episode -->
        <button class="ctrl-btn" id="playerNext" title="Next episode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        </button>
        <!-- Speed -->
        <button class="speed-btn" id="playerSpeedBtn" title="Playback speed">1x</button>
      </div>
      <!-- Progress bar -->
      <div class="player-progress-row">
        <span class="player-time" id="playerCurrentTime">0:00</span>
        <div class="player-progress-bar" id="playerProgressBar">
          <div class="player-progress-fill" id="playerProgressFill" style="width:0%"></div>
        </div>
        <span class="player-time right" id="playerDuration">0:00</span>
      </div>
    </div>

    <!-- Right: volume + extras -->
    <div class="player-extras">
      <div class="volume-row">
        <button class="ext-btn" id="playerVolumeIcon" title="Mute / Unmute">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
        <div class="volume-slider" id="playerVolumeSlider">
          <div class="volume-slider-fill" id="playerVolumeFill" style="width:100%"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Nav -->
  <nav class="mobile-nav">
    <button class="mobile-nav-item" onclick="navigate('/home')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</button>
    <button class="mobile-nav-item" onclick="navigate('/browse')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>Explore</button>
    <button class="mobile-nav-item" onclick="navigate('/library')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>Library</button>
    <button class="mobile-nav-item" onclick="navigate('/history')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>History</button>
  </nav>

<script>
  var podcastId = null;
  var podcastData = null;

  function showLoading(show) { document.getElementById('loadingSpinner').style.display = show ? 'flex' : 'none'; }
  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function getTimeAgo(date) { if (!date) return ''; var sec = Math.floor((Date.now() - new Date(date)) / 1000); if (sec < 60) return 'just now'; var min = Math.floor(sec / 60); if (min < 60) return min + ' min ago'; var hr = Math.floor(min / 60); if (hr < 24) return hr + ' hour' + (hr > 1 ? 's' : '') + ' ago'; var d = Math.floor(hr / 24); return d + ' day' + (d > 1 ? 's' : '') + ' ago'; }
  function formatDuration(dur) { if (dur == null) return '0:00'; if (typeof dur === 'number') { var m = Math.floor(dur / 60); var s = Math.floor(dur % 60); return m + ':' + (s < 10 ? '0' : '') + s; } var parts = dur.split(':'); if (parts.length === 2) return dur; var totalSec = parseInt(dur, 10); if (isNaN(totalSec)) return '0:00'; var m = Math.floor(totalSec / 60); var s = totalSec % 60; return m + ':' + (s < 10 ? '0' : '') + s; }

  var colors = [['#1E293B','#0F172A'],['#1E3A5F','#0C2233'],['#2D1B69','#1A0D3B'],['#5B1E3A','#2E0F1D'],['#1B4D3E','#0D2B22'],['#6B3A1E','#3D1F0F']];
  function pickColor(id) {
    if (!id) return colors[0];
    var idx = id.split('').reduce(function(a,c){return a+c.charCodeAt(0);},0) % colors.length;
    return colors[idx];
  }

  function initApp() {
    var user = PUBLIC_API.getUser();
    if (!user) { PUBLIC_API.logout(); return; }
    loadPodcast(user);
  }

  async function loadPodcast(user) {
    var params = new URLSearchParams(window.location.search);
    podcastId = params.get('id');
    if (!podcastId) { navigate('/home'); return; }

    document.querySelector('.avatar').textContent = (user.display_name || user.email || 'U')[0].toUpperCase();
    document.getElementById('signOutBtn').addEventListener('click', function() { PUBLIC_API.logout(); });
    document.querySelector('.avatar').addEventListener('click', function() { navigate('/profile'); });

    showLoading(true);
    try {
      var resp = await fetch('/api/podcasts/' + encodeURIComponent(podcastId));
      var json = await resp.json();
      podcastData = json.data;
      if (!podcastData) {
        showLoading(false);
        document.getElementById('mainContent').innerHTML = '<div class="loading-error">Podcast not found.</div>';
        return;
      }

      renderPodcast(podcastData);
      showLoading(false);
      loadUserRating();
      checkFollowStatus();
    } catch (e) {
      console.error('[Podcast]', e);
      showLoading(false);
      document.getElementById('mainContent').innerHTML = '<div class="loading-error">Failed to load podcast. Please try again.</div>';
    }
  }

  function renderPodcast(p) {
    var c = pickColor(p.id);
    document.querySelector('.cover-bg').style.background = 'linear-gradient(135deg,' + c[0] + ',' + c[1] + ')';
    document.getElementById('podcastTitle').textContent = p.title || 'Untitled';
    document.getElementById('podcastAuthor').textContent = p.author || 'Unknown';
    document.getElementById('podcastDesc').textContent = p.description || 'No description available.';
    document.getElementById('episodeCount').textContent = (p.episodes || []).length || 0;
    document.getElementById('followerCount').textContent = p.followers_count || 0;
    document.getElementById('releaseInfo').textContent = p.release_schedule || 'Ongoing';
    document.getElementById('backLink').href = document.referrer && document.referrer.includes(window.location.host) ? document.referrer : '/home';

    // Category badge
    if (p.category) {
      document.getElementById('podcastCategory').textContent = p.category;
    } else {
      document.getElementById('podcastCategory').style.display = 'none';
    }

    // Episodes
    renderEpisodes(p.episodes || []);
  }

  function renderEpisodes(episodes) {
    var container = document.getElementById('episodeList');
    container.innerHTML = '';
    if (episodes.length === 0) {
      container.innerHTML = '<p style="color:#94A3B8;padding:20px;">No episodes yet.</p>';
      return;
    }
    // Build playlist for SWPlayer
    window._episodePlaylist = episodes.map(function(e) {
      return {
        id: e.id,
        title: e.title || 'Untitled',
        audioUrl: e.audio_url || '',
        duration: e.duration || null,
        podcastTitle: podcastData ? (podcastData.title || '') : '',
        podcastId: podcastId,
      };
    });
    episodes.forEach(function(e, i) {
      var hasAudio = !!e.audio_url;
      container.innerHTML +=
        '<div class="episode-row" data-episode-id="' + esc(e.id) + '" onclick="navigate(\'/podcast?id=' + encodeURIComponent(podcastId) + '\')">' +
          '<span class="episode-num">' + (i + 1) + '</span>' +
          '<div class="episode-info">' +
            '<div class="ep-title">' + esc(e.title) + '</div>' +
            '<div class="ep-meta">' + getTimeAgo(e.published_at) + '</div>' +
          '</div>' +
          '<span class="episode-dur">' + formatDuration(e.duration) + '</span>' +
          '<button class="episode-play" data-episode-id="' + esc(e.id) + '"' +
            (hasAudio ? '' : ' disabled title="No audio available" style="opacity:0.4;cursor:not-allowed;"') +
            ' onclick="event.stopPropagation();playEpisode(\'' + esc(e.id) + '\',\'' + esc((e.title||'').replace(/'/g,"\\')")) + '\',\'' + esc((e.audio_url||'')) + '\',' + i + ')">' +
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="#475569"><polygon points="5,3 19,12 5,21"/></svg>' +
          '</button>' +
        '</div>';
    });
  }

  function playEpisode(episodeId, title, audioUrl, idx) {
    var ep = window._episodePlaylist && window._episodePlaylist[idx];
    if (ep) {
      SWPlayer.play(ep, window._episodePlaylist, idx);
    }
  }

  // Rating
  function loadUserRating() {
    PUBLIC_API.get('/api/ratings/' + encodeURIComponent(podcastId))
      .then(function(json) {
        if (json.data && json.data.rating) {
          renderStars(json.data.rating);
        } else {
          renderStars(0);
        }
      })
      .catch(function() { renderStars(0); });
  }

  function renderStars(rating) {
    var container = document.getElementById('starRating');
    container.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
      var active = i <= rating;
      var star = document.createElement('span');
      star.className = 'star ' + (active ? 'active' : 'inactive');
      star.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="' + (active ? '#F59E0B' : 'none') + '" stroke="' + (active ? '#F59E0B' : '#CBD5E1') + '" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
      star.onclick = function() { submitRating(i); };
      container.appendChild(star);
    }
    document.getElementById('ratingLabel').textContent = rating > 0 ? 'Your rating: ' + rating + '/5' : 'Rate this podcast';
  }

  function submitRating(rating) {
    PUBLIC_API.post('/api/ratings', { podcast_id: podcastId, rating: rating })
    .then(function(res) {
      if (res && res.error) {
        showToast(res.error.includes('log out') ? '⚠️ Please log out and log back in, then try rating again.' : 'Failed to save rating.');
        return;
      }
      renderStars(rating);
    })
    .catch(function(e) { console.warn('[Rating]', e); });
  }

  // Follow
  function checkFollowStatus() {
    PUBLIC_API.get('/api/follows')
      .then(function(json) {
        var list = json.data || [];
        var isFollowing = list.some(function(p) { return p.id === podcastId; });
        updateFollowBtn(isFollowing);
      })
      .catch(function() {});
  }

  function updateFollowBtn(following) {
    var btn = document.getElementById('followBtn');
    btn.className = 'follow-btn ' + (following ? 'following' : 'not-following');
    btn.textContent = following ? 'Following' : '+ Follow';
    btn.onclick = function() { toggleFollow(!following); };
  }

  function toggleFollow(follow) {
    PUBLIC_API.post('/api/follows', { podcast_id: podcastId, follow: follow, title: podcastData ? podcastData.title : '', image_url: podcastData ? podcastData.image_url : '' })
    .then(function(res) {
      if (res && res.error) {
        showToast(res.error.includes('log out') ? '⚠️ Please log out and log back in, then try following again.' : 'Failed to update follow status.');
        return;
      }
      updateFollowBtn(follow);
      var countEl = document.getElementById('followerCount');
      if (countEl) {
        var val = parseInt(countEl.textContent, 10) || 0;
        countEl.textContent = Math.max(0, val + (follow ? 1 : -1));
      }
    })
    .catch(function(e) { console.warn('[Follow]', e); });
  }

  function showToast(msg) {
    var old = document.getElementById('swToast');
    if (old) old.remove();
    var el = document.createElement('div');
    el.id = 'swToast';
    el.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#0F172A;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.3);white-space:nowrap;';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function() { if (el.parentNode) el.remove(); }, 5000);
  }

  // Topbar search
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('topSearch').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && this.value.trim().length >= 3) {
        navigate('/browse?q=' + encodeURIComponent(this.value.trim()));
      }
    });
  });

  initApp();
</script>
</body>
</html>
