<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundWave - Discover</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sidebar: 240px;
      --player-h: 80px;
      --topbar-h: 64px;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      min-height: 100vh;
      display: flex;
    }
    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; left: 0;
      width: var(--sidebar); height: 100vh;
      background: #0F172A; display: flex; flex-direction: column;
      z-index: 100; border-right: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 20px 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-brand svg { flex-shrink: 0; }
    .sidebar-brand span { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.3px; line-height: 1.2; }
    .sidebar-brand span small { display: block; font-size: 10px; font-weight: 500; color: #38BDF8; letter-spacing: 0.3px; }
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 10px;
      color: #64748B; font-size: 14px; font-weight: 500;
      cursor: pointer; border: none; background: transparent;
      font-family: inherit; width: 100%; text-align: left;
      transition: all 0.15s;
    }
    .nav-item:hover { color: #CBD5E1; background: rgba(255,255,255,0.05); }
    .nav-item.active { color: #fff; background: rgba(56,189,248,0.15); }
    .nav-item.active svg { color: #38BDF8; }
    .nav-item svg { flex-shrink: 0; }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    .sidebar-footer .nav-item { font-size: 13px; }
    /* Main Area */
    .main-area {
      margin-left: var(--sidebar);
      width: calc(100% - var(--sidebar));
      padding-bottom: var(--player-h);
      min-height: 100vh;
      display: flex; flex-direction: column;
    }
    /* Topbar */
    .topbar {
      height: var(--topbar-h);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      background: #fff;
      border-bottom: 1px solid #E2E8F0;
      position: sticky; top: 0; z-index: 50;
    }
    .search-wrapper {
      display: flex; align-items: center;
      background: #F1F5F9; border-radius: 10px;
      padding: 0 14px; width: 320px;
      border: 1px solid transparent; transition: border-color 0.2s;
    }
    .search-wrapper:focus-within { border-color: #38BDF8; background: #fff; }
    .search-wrapper input {
      flex: 1; padding: 10px 10px; font-size: 14px;
      color: #0F172A; background: transparent; border: none;
      outline: none; font-family: inherit;
    }
    .search-wrapper input::placeholder { color: #94A3B8; }
    .topbar-icons { display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; background: transparent;
      color: #64748B; transition: all 0.15s;
    }
    .icon-btn:hover { background: #F1F5F9; color: #0F172A; }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, #38BDF8, #818CF8);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; margin-left: 4px;
    }
    /* Content */
    .content { flex: 1; padding: 28px 32px 32px; overflow-y: auto; }
    .content h1 { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
    .content .subtitle { color: #64748B; font-size: 14px; margin-bottom: 28px; }
    /* Big search */
    .big-search {
      display: flex; align-items: center;
      background: #fff; border: 2px solid #E2E8F0;
      border-radius: 14px; padding: 0 18px;
      margin-bottom: 28px; transition: border-color 0.2s;
    }
    .big-search:focus-within { border-color: #38BDF8; }
    .big-search input {
      flex: 1; padding: 14px 12px; font-size: 16px;
      border: none; outline: none; background: transparent;
      font-family: inherit; color: #0F172A;
    }
    .big-search input::placeholder { color: #94A3B8; }
    /* Category pills */
    .category-pills {
      display: flex; gap: 10px; overflow-x: auto;
      padding-bottom: 8px; margin-bottom: 28px;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .category-pills::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0; padding: 8px 20px; border-radius: 999px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: 1px solid #E2E8F0; background: #fff;
      color: #475569; font-family: inherit;
      transition: all 0.15s; white-space: nowrap;
    }
    .cat-pill:hover { border-color: #38BDF8; color: #38BDF8; }
    .cat-pill.active { background: #38BDF8; border-color: #38BDF8; color: #fff; }
    /* Podcast grid */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-header h2 { font-size: 20px; font-weight: 800; color: #0F172A; }
    .podcast-grid {
      display: flex; flex-wrap: wrap; gap: 20px;
      margin-bottom: 32px;
    }
    .podcast-card {
      width: 180px; cursor: pointer;
      transition: transform 0.15s;
    }
    .podcast-card:hover { transform: translateY(-4px); }
    .podcast-cover {
      width: 180px; height: 180px;
      border-radius: 14px; margin-bottom: 12px;
      position: relative; overflow: hidden;
    }
    .podcast-cover .cover-bg {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .cover-play-overlay {
      position: absolute; bottom: 10px; right: 10px;
      width: 40px; height: 40px; border-radius: 50%;
      background: #38BDF8; display: flex; align-items: center;
      justify-content: center; opacity: 0; transform: translateY(6px);
      transition: all 0.2s; box-shadow: 0 4px 12px rgba(56,189,248,0.4);
    }
    .podcast-card:hover .cover-play-overlay { opacity: 1; transform: translateY(0); }
    .podcast-title {
      font-size: 14px; font-weight: 600; color: #0F172A;
      margin-bottom: 4px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .podcast-author { font-size: 12px; color: #64748B; font-weight: 500; }
    /* Episode results */
    .episode-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
    .episode-row {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 16px; border-radius: 12px;
      cursor: pointer; transition: background 0.15s;
    }
    .episode-row:hover { background: #F1F5F9; }
    .episode-thumb {
      width: 52px; height: 52px; border-radius: 10px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    .episode-info { flex: 1; min-width: 0; }
    .episode-info .ep-title {
      font-size: 14px; font-weight: 600; color: #0F172A;
      margin-bottom: 4px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .episode-info .ep-meta { font-size: 12px; color: #64748B; font-weight: 500; }
    .episode-dur { font-size: 13px; color: #94A3B8; font-weight: 500; }
    .episode-play {
      width: 34px; height: 34px; border-radius: 50%;
      background: #E2E8F0; display: flex; align-items: center;
      justify-content: center; border: none; cursor: pointer;
      flex-shrink: 0; transition: background 0.15s;
    }
    .episode-play:hover { background: #CBD5E1; }
    /* Player bar */
    .player-bar {
      position: fixed; bottom: 0; left: var(--sidebar); right: 0;
      height: var(--player-h); background: #fff;
      border-top: 1px solid #E2E8F0;
      display: flex; align-items: center;
      padding: 0 24px; z-index: 100;
    }
    .player-track { display: flex; align-items: center; gap: 14px; width: 280px; }
    .player-art {
      width: 48px; height: 48px; border-radius: 10px;
      background: linear-gradient(135deg, #1E293B, #0F172A);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    .player-track-info { min-width: 0; }
    .player-track-title {
      font-size: 13px; font-weight: 600; color: #0F172A;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
    }
    .player-track-author { font-size: 12px; color: #64748B; font-weight: 500; }
    .player-controls { display: flex; align-items: center; gap: 6px; margin: 0 auto; }
    .ctrl-btn {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: none; background: transparent; color: #64748B;
      cursor: pointer; transition: all 0.15s;
    }
    .ctrl-btn:hover { color: #0F172A; background: #F1F5F9; }
    .ctrl-btn.play-btn {
      width: 42px; height: 42px; background: #38BDF8;
      color: #fff; box-shadow: 0 2px 8px rgba(56,189,248,0.3);
    }
    .ctrl-btn.play-btn:hover { background: #0EA5E9; }
    /* Loading */
    .loading-overlay {
      position: fixed; inset: 0; background: #F8FAFC;
      z-index: 9999; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 16px;
      transition: opacity 0.3s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-overlay .spinner {
      width: 40px; height: 40px;
      border: 3px solid #E2E8F0; border-top-color: #38BDF8;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay p { font-size: 14px; color: #64748B; font-weight: 500; }
    /* Mobile */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-area { margin-left: 0; width: 100%; }
      .player-bar { left: 0; }
      .topbar { padding: 0 16px; }
      .search-wrapper { width: 200px; }
      .content { padding: 20px 16px 32px; }
      .podcast-card { width: 150px; }
      .podcast-cover { width: 150px; height: 150px; }
      .mobile-nav {
        display: flex; position: fixed; bottom: var(--player-h);
        left: 0; right: 0; height: 56px; background: #fff;
        border-top: 1px solid #E2E8F0; z-index: 99;
        align-items: center; justify-content: space-around; padding: 0 8px;
      }
    }
    @media (min-width: 769px) { .mobile-nav { display: none; } }
    .mobile-nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 6px 10px; border-radius: 8px; border: none;
      background: transparent; cursor: pointer; color: #94A3B8;
      font-size: 10px; font-weight: 600; font-family: inherit;
      transition: all 0.15s;
    }
    .mobile-nav-item.active { color: #38BDF8; }
    .empty-state {
      text-align: center; padding: 60px 20px; color: #94A3B8;
    }
    .empty-state svg { margin-bottom: 16px; }
    .empty-state p { font-size: 15px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Loading discover...</p>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#38BDF8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/>
        <path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/>
        <circle cx="12" cy="12" r="2"/>
      </svg>
      <span>SoundWave <small>Discovery</small></span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item" onclick="location.href='/home'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Home
      </button>
      <button class="nav-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        Discover
      </button>
      <button class="nav-item" onclick="location.href='/library'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
        Library
      </button>
      <button class="nav-item" onclick="location.href='/subscriptions'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m10 15 9-9M13 6h5v5"/><path d="M21 12v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h5"/></svg>
        Subscriptions
      </button>
      <button class="nav-item" onclick="location.href='/history'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        History
      </button>
      <button class="nav-item" onclick="location.href='/profile'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" id="signOutBtn" style="color:#EF4444;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <header class="topbar">
      <div class="search-wrapper">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Search podcasts, episodes..." id="topSearch" />
      </div>
      <div class="topbar-icons">
        <button class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></button>
        <button class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
        <div class="avatar" id="userAvatar">U</div>
      </div>
    </header>

    <main class="content">
      <h1>Discover Podcasts</h1>
      <p class="subtitle">Explore trending shows, search by keyword, or browse categories.</p>

      <!-- Big Search -->
      <div class="big-search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Search podcasts and episodes..." id="searchInput" />
      </div>

      <!-- Category Pills -->
      <div class="category-pills" id="categoryPills"></div>

      <!-- Results -->
      <div id="resultsArea">
        <div class="section-header">
          <h2>All Podcasts</h2>
        </div>
        <div class="podcast-grid" id="podcastGrid"></div>
      </div>

      <!-- Episode Results (hidden by default) -->
      <div id="episodeResults" style="display:none;">
        <div class="section-header">
          <h2>Episodes</h2>
        </div>
        <div class="episode-list" id="episodeList"></div>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <p>No results found</p>
      </div>
    </main>
  </div>

  <!-- Player Bar -->
  <div class="player-bar">
    <div class="player-track">
      <div class="player-art"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/></svg></div>
      <div class="player-track-info">
        <div class="player-track-title">Select a podcast</div>
        <div class="player-track-author">Tap play to listen</div>
      </div>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
      <button class="ctrl-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M18.07 12a5.03 5.03 0 0 0-1.11-2.96"/><path d="M22 12a9.03 9.03 0 0 0-3.29-6.96"/></svg></button>
      <button class="ctrl-btn play-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></button>
      <button class="ctrl-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13 5 18 9h4v6h-4l-5 4V5z"/><path d="M5.93 12a5.03 5.03 0 0 0 1.11 2.96"/><path d="M2 12a9.03 9.03 0 0 0 3.29 6.96"/></svg></button>
      <button class="ctrl-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
    </div>
  </div>

  <!-- Mobile Nav -->
  <nav class="mobile-nav">
    <button class="mobile-nav-item" onclick="location.href='/home'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </button>
    <button class="mobile-nav-item active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      Explore
    </button>
    <button class="mobile-nav-item" onclick="location.href='/library'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
      Library
    </button>
    <button class="mobile-nav-item" onclick="location.href='/history'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      History
    </button>
  </nav>

<script>
  var selectedCategory = null;
  var allPodcasts = [];
  var debounceTimer = null;

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function initApp() {
    if (!PUBLIC_API.requireAuth()) return;
    onReady();
  }

  function onReady() {
    var user = PUBLIC_API.getUser();
    if (!user) { PUBLIC_API.logout(); return; }
    var initial = (user.display_name || user.email || 'U')[0].toUpperCase();
    document.getElementById('userAvatar').textContent = initial;
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('signOutBtn').addEventListener('click', function() { PUBLIC_API.logout(); });
    document.querySelector('.avatar')?.addEventListener('click', function() { location.href = '/profile'; });

    loadCategories();
    loadAllPodcasts();

    // Search input listener
    document.getElementById('searchInput').addEventListener('input', function(e) {
      clearTimeout(debounceTimer);
      var val = e.target.value.trim();
      debounceTimer = setTimeout(function() {
        if (val.length >= 3) { performSearch(val); }
        else { resetToAll(); }
      }, 300);
    });

    document.getElementById('topSearch').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        var val = e.target.value.trim();
        if (val.length >= 3) {
          document.getElementById('searchInput').value = val;
          performSearch(val);
        }
      }
    });
  }

  async function loadCategories() {
    try {
      var resp = await fetch('/api/categories');
      var json = await resp.json();
      var list = json.data || [];
      var container = document.getElementById('categoryPills');
      container.innerHTML = '<button class="cat-pill active" data-cat="">All</button>';
      list.forEach(function(c) {
        container.innerHTML += '<button class="cat-pill" data-cat="' + esc(c.name) + '">' + esc(c.name) + '</button>';
      });
      container.querySelectorAll('.cat-pill').forEach(function(btn) {
        btn.addEventListener('click', function() {
          container.querySelectorAll('.cat-pill').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          selectedCategory = btn.getAttribute('data-cat');
          if (selectedCategory) { filterByCategory(selectedCategory); }
          else { resetToAll(); }
        });
      });
    } catch (e) { console.warn('[Categories]', e); }
  }

  async function loadAllPodcasts() {
    try {
      var resp = await fetch('/api/podcasts?limit=20');
      var json = await resp.json();
      allPodcasts = json.data || [];
      renderPodcasts(allPodcasts);
    } catch (e) { console.warn('[Podcasts]', e); }
  }

  function renderPodcasts(list) {
    var container = document.getElementById('podcastGrid');
    container.innerHTML = '';
    var epResults = document.getElementById('episodeResults');
    epResults.style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('resultsArea').style.display = 'block';

    if (list.length === 0) {
      container.innerHTML = '<p style="color:#94A3B8;padding:20px;">No podcasts found.</p>';
      return;
    }
    var gradients = ['#1E293B,#0F172A','#1E3A5F,#0C2233','#2D1B69,#1A0D3B','#5B1E3A,#2E0F1D','#1B4D3E,#0D2B22','#6B3A1E,#3D1F0F'];
    list.forEach(function(p) {
      var idx = (p.id || '').split('').reduce(function(a,c){return a+c.charCodeAt(0);},0) % gradients.length;
      container.innerHTML +=
        '<div class="podcast-card" onclick="location.href=\'/podcast?id=' + encodeURIComponent(p.id) + '\'">' +
          '<div class="podcast-cover"><div class="cover-bg" style="background:linear-gradient(135deg,' + gradients[idx] + ');">' +
            '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5">' +
              '<path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/>' +
            '</svg></div>' +
            '<div class="cover-play-overlay"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></div>' +
          '</div>' +
          '<div class="podcast-title">' + esc(p.title) + '</div>' +
          '<div class="podcast-author">' + esc(p.author || '') + '</div>' +
        '</div>';
    });
  }

  function renderEpisodes(list) {
    var container = document.getElementById('episodeList');
    container.innerHTML = '';
    var gradients = ['#1E293B,#0F172A','#1E3A5F,#0C2233','#2D1B69,#1A0D3B','#5B1E3A,#2E0F1D'];
    list.forEach(function(e) {
      var idx = Math.floor(Math.random() * gradients.length);
      var podcastTitle = (e.podcasts && e.podcasts.title) || '';
      var author = (e.podcasts && e.podcasts.author) || '';
      container.innerHTML +=
        '<div class="episode-row" onclick="location.href=\'/podcast?id=' + encodeURIComponent(e.podcast_id) + '\'">' +
          '<div class="episode-thumb" style="background:linear-gradient(135deg,' + gradients[idx] + ');">' +
            '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/></svg>' +
          '</div>' +
          '<div class="episode-info">' +
            '<div class="ep-title">' + esc(e.title) + '</div>' +
            '<div class="ep-meta">' + esc(author || podcastTitle) + ' \u00B7 ' + getTimeAgo(e.published_at) + '</div>' +
          '</div>' +
          '<span class="episode-dur">' + formatDuration(e.duration) + '</span>' +
          '<button class="episode-play" onclick="event.stopPropagation();console.log(\'Play:\',\'' + encodeURIComponent(e.id) + '\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="#475569"><polygon points="5,3 19,12 5,21"/></svg></button>' +
        '</div>';
    });
  }

  async function filterByCategory(catName) {
    document.getElementById('resultsArea').style.display = 'block';
    document.getElementById('episodeResults').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
    try {
      var resp = await fetch('/api/categories/' + encodeURIComponent(catName) + '/podcasts');
      var json = await resp.json();
      renderPodcasts(json.data || []);
      document.querySelector('.section-header h2').textContent = catName + ' Podcasts';
    } catch (e) { console.warn('[Filter]', e); }
  }

  async function performSearch(term) {
    document.getElementById('resultsArea').style.display = 'none';
    document.getElementById('episodeResults').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
    try {
      var resp = await fetch('/api/search?q=' + encodeURIComponent(term));
      var json = await resp.json();
      var podcasts = json.podcasts || [];
      var episodes = json.episodes || [];

      if (podcasts.length === 0 && episodes.length === 0) {
        document.getElementById('emptyState').style.display = 'block';
        document.querySelector('.section-header h2').textContent = 'All Podcasts';
        return;
      }

      if (podcasts.length > 0) {
        document.getElementById('resultsArea').style.display = 'block';
        document.querySelector('.section-header h2').textContent = 'Podcasts matching "' + esc(term) + '"';
        renderPodcasts(podcasts);
      } else {
        document.getElementById('resultsArea').style.display = 'none';
      }

      if (episodes.length > 0) {
        document.getElementById('episodeResults').style.display = 'block';
        renderEpisodes(episodes);
      }
    } catch (e) { console.warn('[Search]', e); }
  }

  function resetToAll() {
    selectedCategory = null;
    document.querySelector('.section-header h2').textContent = 'All Podcasts';
    document.getElementById('episodeResults').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('resultsArea').style.display = 'block';
    if (allPodcasts.length > 0) renderPodcasts(allPodcasts);
    else loadAllPodcasts();
  }

  function getTimeAgo(date) {
    if (!date) return 'recent';
    var sec = Math.floor((Date.now() - new Date(date)) / 1000);
    if (sec < 60) return 'just now';
    var min = Math.floor(sec / 60);
    if (min < 60) return min + ' min ago';
    var hr = Math.floor(min / 60);
    if (hr < 24) return hr + ' hour' + (hr > 1 ? 's' : '') + ' ago';
    var d = Math.floor(hr / 24);
    return d + ' day' + (d > 1 ? 's' : '') + ' ago';
  }

  function formatDuration(dur) {
    if (dur == null) return '0:00';
    if (typeof dur === 'number') { var m = Math.floor(dur / 60); var s = Math.floor(dur % 60); return m + ':' + (s < 10 ? '0' : '') + s; }
    var parts = dur.split(':');
    if (parts.length === 2) return dur;
    var totalSec = parseInt(dur, 10);
    if (isNaN(totalSec)) return '0:00';
    var m = Math.floor(totalSec / 60);
    var s = totalSec % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  initApp();
</script>
</body>
</html>
