<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundWave - Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Firebase SDK (compat — no bundler needed) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0B1121 0%, #0F172A 50%, #1A1F35 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Soft spotlight glow */
    .spotlight {
      position: fixed;
      top: -120px;
      left: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56,189,248,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Headphones silhouette */
    .headphones-silhouette {
      position: fixed;
      bottom: -20px;
      right: -20px;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    .headphones-silhouette svg { width: 240px; height: 240px; }

    .container {
      width: 100%;
      max-width: 960px;
      position: relative;
      z-index: 1;
    }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(11,17,33,0.7);
      backdrop-filter: blur(4px);
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(56,189,248,0.2);
      border-top-color: #38BDF8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(56,189,248,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-text {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    /* Split layout */
    .split-row {
      display: flex;
      align-items: center;
      gap: 48px;
    }

    /* ===== LEFT PANEL ===== */
    .left-panel {
      flex: 1;
      max-width: 420px;
      display: none;
    }
    .left-panel.visible { display: block; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(16,185,129,0.15);
      border: 1px solid rgba(16,185,129,0.3);
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #10B981;
    }
    .badge-text {
      font-size: 11px;
      font-weight: 700;
      color: #10B981;
      letter-spacing: 0.5px;
    }
    .hero-title {
      font-size: 42px;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .hero-title .accent { color: #10B981; }
    .hero-sub {
      font-size: 16px;
      color: #94A3B8;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .preview-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(30,41,59,0.6);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 20px;
    }
    .preview-icon {
      width: 52px; height: 52px;
      border-radius: 12px;
      background: rgba(56,189,248,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .preview-info { flex: 1; min-width: 0; }
    .preview-label {
      font-size: 10px; font-weight: 700; color: #38BDF8;
      letter-spacing: 1px; margin-bottom: 4px;
    }
    .preview-title {
      font-size: 15px; font-weight: 600; color: #fff;
      margin-bottom: 12px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .preview-bars { display: flex; gap: 4px; align-items: center; padding-top: 2px; }
    .preview-bar { height: 3px; border-radius: 2px; background: #475569; }
    .preview-bar:first-child { width: 30%; }
    .preview-bar:nth-child(2) { width: 60%; }
    .preview-bar:nth-child(3) { width: 40%; }
    .preview-play {
      width: 36px; height: 36px; border-radius: 50%; background: #38BDF8;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: pointer; border: none;
      transition: transform 0.15s;
    }
    .preview-play:hover { transform: scale(1.05); }
    .preview-play:active { transform: scale(0.95); }

    /* ===== RIGHT PANEL ===== */
    .right-panel { flex: 1; max-width: 440px; margin: 0 auto; }

    .form-card {
      width: 100%;
      background: rgba(30,41,59,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 32px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Toggle */
    .toggle-row {
      display: flex;
      background: rgba(15,23,42,0.8);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .toggle-tab {
      flex: 1; padding: 10px; border-radius: 10px;
      text-align: center; cursor: pointer;
      font-size: 14px; font-weight: 600; font-family: inherit;
      color: #64748B; background: transparent; border: none;
      outline: none; box-shadow: none;
      transition: all 0.2s;
    }
    .toggle-tab:focus-visible { outline: 2px solid rgba(56,189,248,0.5); outline-offset: -2px; }
    .toggle-tab.active { background: #38BDF8; color: #0F172A; }
    .toggle-tab:not(.active):hover { color: #94A3B8; }

    .form-body { display: block; }
    .form-body.hidden { display: none; }

    .form-group { margin-bottom: 18px; }
    .input-label {
      display: block; font-size: 12px; font-weight: 600;
      color: #CBD5E1; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .input-wrapper {
      display: flex; align-items: center;
      background: rgba(15,23,42,0.6);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 0 14px;
      transition: border-color 0.2s;
    }
    .input-wrapper:focus-within { border-color: rgba(56,189,248,0.5); }
    .input-icon { margin-right: 10px; flex-shrink: 0; display: flex; }
    .input-wrapper input {
      flex: 1; padding: 14px 0; font-size: 15px; color: #fff;
      background: transparent; border: none; outline: none; font-family: inherit;
    }
    .input-wrapper input::placeholder { color: #64748B; }
    .eye-toggle {
      padding: 4px; cursor: pointer; background: none; border: none;
      display: flex; opacity: 0.5; transition: opacity 0.2s;
    }
    .eye-toggle:hover { opacity: 0.8; }

    .password-row { display: flex; gap: 10px; }
    .password-row .form-group { flex: 1; min-width: 0; }
    .password-row .input-wrapper { min-width: 0; }
    .password-row .input-wrapper input { min-width: 0; width: 100%; }

    .primary-btn {
      width: 100%;
      background: linear-gradient(135deg, #38BDF8 0%, #0EA5E9 100%);
      padding: 16px; border-radius: 12px; border: none;
      font-size: 16px; font-weight: 700; color: #0F172A;
      cursor: pointer; font-family: inherit;
      margin-top: 8px; margin-bottom: 24px;
      box-shadow: 0 4px 14px rgba(56,189,248,0.25);
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .primary-btn:hover {
      background: linear-gradient(135deg, #0EA5E9 0%, #0284C7 100%);
      box-shadow: 0 6px 20px rgba(56,189,248,0.35);
      transform: translateY(-1px);
    }
    .primary-btn:active { transform: translateY(0) scale(0.98); }
    .primary-btn:disabled {
      opacity: 0.5; cursor: not-allowed; transform: none !important;
    }

    .divider { display: flex; align-items: center; margin-bottom: 24px; }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
    .divider-text {
      margin: 0 12px; font-size: 11px; color: #64748B;
      font-weight: 600; letter-spacing: 0.5px; white-space: nowrap;
    }

    .social-row { display: flex; gap: 12px; margin-bottom: 24px; }
    .social-btn {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 14px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05); color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: background 0.2s;
    }
    .social-btn:hover { background: rgba(255,255,255,0.1); }

    .footer { display: flex; justify-content: center; gap: 24px; margin-top: 24px; }
    .footer a {
      font-size: 12px; color: #64748B; font-weight: 500; text-decoration: none;
    }
    .footer a:hover { color: #94A3B8; }

    .message {
      padding: 12px 16px; border-radius: 10px; font-size: 13px;
      margin-bottom: 18px; display: none;
    }
    .message.error {
      display: block; background: rgba(239,68,68,0.15);
      color: #FCA5A5; border: 1px solid rgba(239,68,68,0.3);
    }
    .message.success {
      display: block; background: rgba(34,197,94,0.15);
      color: #86EFAC; border: 1px solid rgba(34,197,94,0.3);
    }

    @media (min-width: 768px) {
      .left-panel.visible { display: block; }
      .logo { display: none; }
      .split-row { flex-direction: row; }
    }
    @media (max-width: 767px) {
      .left-panel.visible { display: none; }
      .logo { display: flex; justify-content: center; margin-bottom: 28px; }
      .form-card { padding: 24px 20px; border-radius: 16px; }
      .password-row { flex-direction: column; gap: 0; }
      .password-row .input-wrapper input { min-width: 0; }
      .social-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <!-- Loading overlay -->
  <div class="loading-overlay active" id="loadingOverlay">
    <div style="text-align:center;">
      <div class="spinner" style="margin:0 auto 16px;"></div>
      <div style="color:#94A3B8; font-size:13px; font-weight:500;" id="loadingText">Connecting to SoundWave...</div>
    </div>
  </div>

  <div class="spotlight"></div>
  <div class="headphones-silhouette">
    <svg viewBox="0 0 24 24" fill="currentColor" color="white">
      <path d="M12 1a9 9 0 0 0-9 9v7c0 1.66 1.34 3 3 3h3v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-4v8h3c1.66 0 3-1.34 3-3v-7a9 9 0 0 0-9-9z"/>
    </svg>
  </div>

  <div class="container">
    <!-- Logo (mobile) -->
    <div class="logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/>
          <path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/>
          <path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/>
          <path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/>
          <circle cx="12" cy="12" r="2"/>
        </svg>
      </div>
      <span class="logo-text">SoundWave</span>
    </div>

    <div class="split-row">
      <!-- LEFT PANEL -->
      <div class="left-panel visible">
        <div class="badge">
          <span class="badge-dot"></span>
          <span class="badge-text">NEW EPISODES DAILY</span>
        </div>
        <h1 class="hero-title">Hear what <span class="accent">matters most.</span></h1>
        <p class="hero-sub">Discover, stream, and curate the podcasts that define your world.</p>
        <div class="preview-card">
          <div class="preview-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#38BDF8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="4"/>
              <path d="M9 9v6"/><path d="M15 9v6"/>
            </svg>
          </div>
          <div class="preview-info">
            <div class="preview-label">NOW TRENDING</div>
            <div class="preview-title">The Pulse: Future of AI</div>
            <div class="preview-bars"><span class="preview-bar"></span><span class="preview-bar"></span><span class="preview-bar"></span></div>
          </div>
          <button class="preview-play">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="right-panel">
        <div class="logo" style="display:flex; justify-content:center; margin-bottom:28px;">
          <div class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/>
              <path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/>
              <circle cx="12" cy="12" r="2"/>
            </svg>
          </div>
          <span class="logo-text">SoundWave</span>
        </div>

        <div class="form-card">
          <div class="toggle-row">
            <button class="toggle-tab active" data-mode="login" onclick="switchMode('login')">Sign In</button>
            <button class="toggle-tab" data-mode="signup" onclick="switchMode('signup')">Create Account</button>
          </div>

          <div id="message" class="message"></div>

          <!-- LOGIN -->
          <div id="login-form" class="form-body">
            <div class="form-group">
              <label class="input-label">Email Address</label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                </span>
                <input type="email" id="login-email" placeholder="name@company.com" autocomplete="email">
              </div>
            </div>
            <div class="form-group">
              <label class="input-label">Password</label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
                <button class="eye-toggle" onclick="togglePass('login-password',this)" type="button">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>
            <button class="primary-btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
          </div>

          <!-- SIGNUP -->
          <div id="signup-form" class="form-body hidden">
            <div class="form-group">
              <label class="input-label">Full Name</label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
                <input type="text" id="signup-name" placeholder="Enter your full name" autocomplete="name">
              </div>
            </div>
            <div class="form-group">
              <label class="input-label">Email Address</label>
              <div class="input-wrapper">
                <span class="input-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                </span>
                <input type="email" id="signup-email" placeholder="name@company.com" autocomplete="email">
              </div>
            </div>
            <div class="password-row">
              <div class="form-group">
                <label class="input-label">Password</label>
                <div class="input-wrapper">
                  <span class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                  </span>
                  <input type="password" id="signup-password" placeholder="••••••••" autocomplete="new-password">
                  <button class="eye-toggle" onclick="togglePass('signup-password',this)" type="button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
              </div>
              <div class="form-group">
                <label class="input-label">Confirm</label>
                <div class="input-wrapper">
                  <span class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                  </span>
                  <input type="password" id="signup-confirm" placeholder="••••••••" autocomplete="new-password">
                  <button class="eye-toggle" onclick="togglePass('signup-confirm',this)" type="button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
              </div>
            </div>
            <button class="primary-btn" id="signupBtn" onclick="handleSignUp()">Create Account</button>
          </div>

          <div class="divider">
            <span class="divider-line"></span>
            <span class="divider-text">OR CONTINUE WITH</span>
            <span class="divider-line"></span>
          </div>
          <div class="social-row">
            <button class="social-btn" onclick="showMsg('Google sign-in coming soon','info')">
              <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
              Google
            </button>
            <button class="social-btn" onclick="showMsg('Apple sign-in coming soon','info')">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
              Apple
            </button>
          </div>
          <div class="footer">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Help</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Firebase Init ──
    let auth = null;
    let db = null;
    let firebaseReady = false;

    async function initFirebase() {
      try {
        const resp = await fetch('/api/config');
        if (!resp.ok) throw new Error('Config endpoint returned ' + resp.status);
        const config = await resp.json();
        firebase.initializeApp(config);
        auth = firebase.auth();
        db = firebase.firestore();

        db.enablePersistence().catch(function(){});

        firebaseReady = true;
        console.log('[Firebase] Initialized');

        // Auth state listener — NEVER auto-redirect here.
        // Only redirect after explicit Sign In button click (handleLogin).
        auth.onAuthStateChanged(function(user) {
          if (user) {
            console.log('[Auth] User is signed in (waiting for manual redirect)');
          }
          // Always hide loader and show the auth form
          setLoading(false);
        });
      } catch (err) {
        console.error('[Firebase] Init failed:', err);
        document.getElementById('loadingText').textContent = 'Could not connect to SoundWave. Check your connection.';
        document.getElementById('loadingOverlay').innerHTML =
          '<div style="text-align:center;padding:24px;">' +
            '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="1.5" style="margin:0 auto 16px;display:block;">' +
              '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>' +
            '</svg>' +
            '<p style="color:#FCA5A5;font-size:14px;font-weight:600;margin-bottom:8px;">Connection Failed</p>' +
            '<p style="color:#94A3B8;font-size:13px;margin-bottom:20px;">Unable to reach SoundWave servers. Please try again.</p>' +
            '<button onclick="location.reload()" style="padding:10px 24px;border-radius:10px;border:none;background:#38BDF8;color:#0F172A;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">Retry</button>' +
          '</div>';
      }
    }

    // ── UI Helpers ──

    function setLoading(active) {
      document.getElementById('loadingOverlay').classList.toggle('active', active);
    }

    function switchMode(m) {
      document.querySelectorAll('.toggle-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelector('.toggle-tab[data-mode="' + m + '"]').classList.add('active');
      document.getElementById('login-form').classList.toggle('hidden', m !== 'login');
      document.getElementById('signup-form').classList.toggle('hidden', m !== 'signup');
      var msg = document.getElementById('message');
      msg.className = 'message';
      msg.textContent = '';
    }

    function togglePass(id, btn) {
      var i = document.getElementById(id);
      var h = i.type === 'password';
      i.type = h ? 'text' : 'password';
      btn.innerHTML = h
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }

    function showMsg(text, type) {
      var m = document.getElementById('message');
      m.textContent = text;
      m.className = 'message ' + (type === 'error' ? 'error' : 'success');
    }

    function getFirebaseError(err) {
      var code = err.code || '';
      var msg = err.message || '';
      // Incorrect credentials
      if (code === 'auth/invalid-credential' || code === 'auth/user-not-found' || code === 'auth/wrong-password') {
        return 'Incorrect email or password. Please check your credentials and try again.';
      }
      if (code === 'auth/invalid-email') {
        return 'That email address is not valid. Please enter a correct email.';
      }
      if (code === 'auth/email-already-in-use') {
        return 'This email is already registered. Try signing in instead.';
      }
      if (code === 'auth/weak-password') {
        return 'Password too weak — must be at least 6 characters.';
      }
      if (code === 'auth/too-many-requests') {
        return 'Too many failed attempts. Please wait a moment before trying again.';
      }
      if (code === 'auth/network-request-failed') {
        return 'Network error — please check your internet connection.';
      }
      if (code === 'auth/user-disabled') {
        return 'This account has been disabled. Contact support.';
      }
      // Fallback: show a clean message instead of raw Firebase error
      return 'Something went wrong. Please try again.';
    }

    // ── Validation ──

    function validateLogin(email, password) {
      if (!email) return 'Please enter your email address.';
      if (!password) return 'Please enter your password.';
      if (email.indexOf('@') === -1) return 'Please enter a valid email address (e.g., name@company.com).';
      return null;
    }

    function validateSignup(name, email, password, confirm) {
      if (!name) return 'Please enter your full name.';
      if (!email) return 'Please enter your email address.';
      if (!password) return 'Please create a password.';
      if (!confirm) return 'Please confirm your password.';
      if (email.indexOf('@') === -1) return 'Please enter a valid email address (e.g., name@company.com).';
      if (password.length < 6) return 'Password must be at least 6 characters long.';
      if (password !== confirm) return 'Passwords do not match. Please re-enter.';
      return null;
    }

    // ── Auth Actions ──

    async function handleLogin() {
      var email = document.getElementById('login-email').value.trim();
      var password = document.getElementById('login-password').value;

      var validationError = validateLogin(email, password);
      if (validationError) return showMsg(validationError, 'error');

      var btn = document.getElementById('loginBtn');
      btn.disabled = true;
      setLoading(true);
      showMsg('', '');

      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = '/home';
      } catch (err) {
        showMsg(getFirebaseError(err), 'error');
        btn.disabled = false;
        setLoading(false);
      }
    }

    async function handleSignUp() {
      var name = document.getElementById('signup-name').value.trim();
      var email = document.getElementById('signup-email').value.trim();
      var password = document.getElementById('signup-password').value;
      var confirm = document.getElementById('signup-confirm').value;

      var validationError = validateSignup(name, email, password, confirm);
      if (validationError) return showMsg(validationError, 'error');

      var btn = document.getElementById('signupBtn');
      btn.disabled = true;
      setLoading(true);
      showMsg('', '');

      try {
        var cred = await auth.createUserWithEmailAndPassword(email, password);
        await cred.user.updateProfile({ displayName: name });
        await db.collection('users').doc(cred.user.uid).set({
          name: name,
          email: email,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          avatar: null
        });

        // Sign out so they must log in manually
        await auth.signOut();

        // Reset form & show success message
        btn.disabled = false;
        setLoading(false);
        switchMode('login');
        showMsg('Account created! Please sign in to continue.', 'success');
      } catch (err) {
        showMsg(getFirebaseError(err), 'error');
        btn.disabled = false;
        setLoading(false);
      }
    }

    // ── Enter key support ──
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        var loginHidden = document.getElementById('login-form').classList.contains('hidden');
        if (!loginHidden) handleLogin();
        else handleSignUp();
      }
    });

    // ── Boot ──
    initFirebase();
  </script>
</body>
</html>
