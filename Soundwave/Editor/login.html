<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Podcast Editor Suite</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">
        <i class="fa-solid fa-pen-nib"></i>
      </div>
      <h1 class="login-title">Podcast Editor</h1>
      <p class="login-subtitle">Editorial Control Suite</p>
    </div>

    <div class="login-card">
      <h2 class="login-card-title">Sign In</h2>
      <p class="login-card-subtitle">Access your high-density workspace</p>

      <form action="/login" method="POST">
        <div class="input-group">
          <label class="input-label">Editor ID</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-id-badge input-icon"></i>
            <input type="text" name="editorId" class="form-control" placeholder="ED-000-000" required>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">
            Password
            <a href="#" style="font-size: 0.75rem;">Forgot Password?</a>
          </label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>
        </div>

        <label class="checkbox-group">
          <input type="checkbox">
          Keep me authenticated for 12 hours
        </label>

        <button type="submit" class="btn-primary w-full" style="padding: 1rem; font-size: 1rem;">
          Enter Editorial Suite
        </button>
      </form>

      <div class="system-status">
        <span>SYSTEM STATUS</span>
        <div class="status-indicator">
          <div class="status-dot"></div>
          All Nodes Operational
        </div>
      </div>
    </div>

    <div class="login-footer">
      <a href="#">Help Center</a>
      <a href="#">Security Policy</a>
      <a href="#">Terms of Service</a>
      <p style="margin-top: 1rem;">&copy; 2024 Podcast Editor Editorial Control Suite. v4.2.0-stable</p>
    </div>
    
    <i class="fa-solid fa-book-open watermark-icon"></i>
  </div>
</body>
</html>
