<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Podcast Editor Suite</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">
        <i class="fa-solid fa-pen-nib"></i>
      </div>
      <h1 class="login-title">Podcast Editor</h1>
      <p class="login-subtitle">Editorial Control Suite</p>
    </div>

    <div class="login-card">
      <h2 class="login-card-title">Sign In</h2>
      <p class="login-card-subtitle">Access your high-density workspace</p>

      <form id="loginForm">
        <div id="loginError" style="display:none;background:var(--error-bg);color:var(--error-text);padding:0.75rem 1rem;border-radius:6px;margin-bottom:1.25rem;font-size:0.875rem;font-weight:500;"></div>

        <div class="input-group">
          <label class="input-label">Email</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-envelope input-icon"></i>
            <input type="email" id="email" class="form-control" placeholder="editor@soundwave.com" required>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">
            Password
            <a href="#" style="font-size: 0.75rem;">Forgot Password?</a>
          </label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn-primary w-full" style="padding: 1rem; font-size: 1rem;" id="loginBtn">
          Enter Editorial Suite
        </button>
      </form>

      <div class="system-status">
        <span>SYSTEM STATUS</span>
        <div class="status-indicator">
          <div class="status-dot"></div>
          All Nodes Operational
        </div>
      </div>
    </div>

    <div class="login-footer">
      <a href="#">Help Center</a>
      <a href="#">Security Policy</a>
      <a href="#">Terms of Service</a>
      <p style="margin-top: 1rem;">&copy; 2024 Podcast Editor Editorial Control Suite. v4.2.0-stable</p>
    </div>
    
    <i class="fa-solid fa-book-open watermark-icon"></i>
  </div>

  <script>
    // Check if already logged in
    if (localStorage.getItem('editor_token')) {
      window.location.replace('/editorial-dashboard');
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      if (!email || !password) {
        errorEl.textContent = 'Please enter your email and password.';
        errorEl.style.display = 'block';
        return;
      }

      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Login failed');
        }

        // Store token and redirect
        localStorage.setItem('editor_token', data.token);
        localStorage.setItem('editor_email', data.editor.email);
        localStorage.setItem('editor_role', data.editor.role);
        window.location.replace('/editorial-dashboard');
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Enter Editorial Suite';
      }
    });
  </script>
</body>
</html>
