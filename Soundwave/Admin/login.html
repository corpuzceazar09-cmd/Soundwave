<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundwave Admin - Sign In</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { margin: 0; }
  </style>
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">
          <i class="fas fa-podcast"></i>
        </div>
        <h1>Soundwave</h1>
        <p>Admin Panel</p>
      </div>

      <div id="errorMessage" class="error-message">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
      </div>

      <form class="login-form" id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="admin@soundwave.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
        </div>

        <div class="form-options">
          <label style="display:flex;align-items:center;gap:6px;color:var(--text-secondary);cursor:pointer;">
            <input type="checkbox" checked style="accent-color:var(--accent);" />
            <span>Remember me</span>
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i>
          <span>Sign In</span>
        </button>
      </form>
    </div>
  </div>

  <script>
    (function() {
      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const errorMsg = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');
      const loginBtn = document.getElementById('loginBtn');

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        errorMsg.classList.remove('show');

        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password) {
          showError('Please enter both email and password.');
          return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

        try {
          const response = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          const data = await response.json();

          if (response.ok && data.token) {
            localStorage.setItem('admin_token', data.token);
            localStorage.setItem('admin_email', email);
            window.location.href = 'dashboard.html';
          } else {
            showError(data.error || 'Invalid email or password.');
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
          }
        } catch (err) {
          showError('Connection error. Is the server running on port 3002?');
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
        }
      });

      function showError(msg) {
        errorText.textContent = msg;
        errorMsg.classList.add('show');
      }

      // Check if already logged in
      const token = localStorage.getItem('admin_token');
      if (token) {
        fetch('/api/admin/verify', {
          headers: { 'Authorization': 'Bearer ' + token }
        }).then(r => {
          if (r.ok) window.location.href = 'dashboard.html';
        }).catch(() => {});
      }
    })();
  </script>
</body>
</html>
